<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f3460;
    color:white;
    padding:20px;
}

.card {
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:16px;
}

button {
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:12px;
    background:#ff8a00;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div class="card">
    <h1>Privacy Policy</h1>

    <p>Magic Jester Match does NOT collect any personal data.</p>
    <p>We do not store, share or process user information.</p>
    <p>The app is fully offline and privacy-friendly.</p>

    <button onclick="closeWebView()">Close</button>
</div>

<script>
function closeWebView() {
    if (window.Android) {
        Android.closeWebView();
    } else if (window.webkit) {
        window.webkit.messageHandlers.closeWebView.postMessage("");
    } else {
        window.history.back();
    }
}
</script>

</body>
</html>
